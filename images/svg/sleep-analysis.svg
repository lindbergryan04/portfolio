<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <pattern id="grid-sleep" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="600" height="400" fill="#111"/>
  <rect width="600" height="400" fill="url(#grid-sleep)"/>
  <!-- HUD corners -->
  <path d="M 15 15 L 15 40 M 15 15 L 40 15" stroke="#cc0000" stroke-width="1" opacity="0.4" fill="none"/>
  <path d="M 585 15 L 585 40 M 585 15 L 560 15" stroke="#cc0000" stroke-width="1" opacity="0.4" fill="none"/>
  <path d="M 15 385 L 15 360 M 15 385 L 40 385" stroke="#cc0000" stroke-width="1" opacity="0.4" fill="none"/>
  <path d="M 585 385 L 585 360 M 585 385 L 560 385" stroke="#cc0000" stroke-width="1" opacity="0.4" fill="none"/>
  <!-- Title -->
  <text x="300" y="38" text-anchor="middle" font-family="monospace" font-size="11" fill="#cc0000" opacity="0.5" letter-spacing="6">SLEEP_CYCLE_ANALYSIS</text>
  <line x1="170" y1="45" x2="430" y2="45" stroke="#cc0000" stroke-width="0.5" opacity="0.2"/>
  <!-- Sleep stage labels -->
  <g transform="translate(60, 75)">
    <text x="-8" y="5" text-anchor="end" font-family="monospace" font-size="7" fill="#cc0000" opacity="0.6">WAKE</text>
    <text x="-8" y="55" text-anchor="end" font-family="monospace" font-size="7" fill="#888">REM</text>
    <text x="-8" y="105" text-anchor="end" font-family="monospace" font-size="7" fill="#666">LIGHT</text>
    <text x="-8" y="155" text-anchor="end" font-family="monospace" font-size="7" fill="#555">DEEP</text>
    <!-- Grid lines -->
    <line x1="0" y1="0" x2="470" y2="0" stroke="#222" stroke-width="0.5" stroke-dasharray="3 3"/>
    <line x1="0" y1="50" x2="470" y2="50" stroke="#222" stroke-width="0.5" stroke-dasharray="3 3"/>
    <line x1="0" y1="100" x2="470" y2="100" stroke="#222" stroke-width="0.5" stroke-dasharray="3 3"/>
    <line x1="0" y1="150" x2="470" y2="150" stroke="#222" stroke-width="0.5" stroke-dasharray="3 3"/>
    <!-- Hypnogram - stepped sleep stage line -->
    <polyline points="0,0 20,0 20,50 45,50 45,100 80,100 80,150 120,150 120,100 150,100 150,50 175,50 175,100 210,100 210,150 250,150 250,100 275,100 275,50 300,50 300,100 330,100 330,150 360,150 360,100 385,100 385,50 400,50 400,0 420,0 420,50 440,50 440,0 470,0"
      fill="none" stroke="#cc0000" stroke-width="2" opacity="0.8"/>
    <!-- Fill under the hypnogram -->
    <polyline points="0,0 20,0 20,50 45,50 45,100 80,100 80,150 120,150 120,100 150,100 150,50 175,50 175,100 210,100 210,150 250,150 250,100 275,100 275,50 300,50 300,100 330,100 330,150 360,150 360,100 385,100 385,50 400,50 400,0 420,0 420,50 440,50 440,0 470,0 470,170 0,170"
      fill="#cc0000" opacity="0.05"/>
    <!-- Time labels -->
    <text x="0" y="185" font-family="monospace" font-size="7" fill="#555">22:00</text>
    <text x="95" y="185" font-family="monospace" font-size="7" fill="#555">00:00</text>
    <text x="190" y="185" font-family="monospace" font-size="7" fill="#555">02:00</text>
    <text x="285" y="185" font-family="monospace" font-size="7" fill="#555">04:00</text>
    <text x="380" y="185" font-family="monospace" font-size="7" fill="#555">06:00</text>
    <text x="455" y="185" font-family="monospace" font-size="7" fill="#555">07:30</text>
  </g>
  <!-- Efficiency gauge -->
  <g transform="translate(510, 100)">
    <text x="0" y="0" text-anchor="middle" font-family="monospace" font-size="8" fill="#666">EFFICIENCY</text>
    <text x="0" y="28" text-anchor="middle" font-family="monospace" font-size="24" fill="#cc0000" font-weight="bold">87%</text>
    <line x1="-30" y1="38" x2="30" y2="38" stroke="#333" stroke-width="1"/>
    <text x="0" y="55" text-anchor="middle" font-family="monospace" font-size="8" fill="#555">DURATION</text>
    <text x="0" y="72" text-anchor="middle" font-family="monospace" font-size="14" fill="#888">7h32m</text>
    <line x1="-30" y1="82" x2="30" y2="82" stroke="#333" stroke-width="1"/>
    <text x="0" y="98" text-anchor="middle" font-family="monospace" font-size="8" fill="#555">DEEP</text>
    <text x="0" y="112" text-anchor="middle" font-family="monospace" font-size="12" fill="#666">1h48m</text>
    <text x="0" y="132" text-anchor="middle" font-family="monospace" font-size="8" fill="#555">REM</text>
    <text x="0" y="146" text-anchor="middle" font-family="monospace" font-size="12" fill="#666">2h04m</text>
  </g>
  <!-- Brain wave decoration (tiny EEG) -->
  <g transform="translate(60, 300)">
    <text x="0" y="0" font-family="monospace" font-size="7" fill="#444">EEG_DELTA:</text>
    <polyline points="60,0 65,-4 68,3 71,-6 74,5 77,-3 80,4 83,-5 86,2 89,-4 92,6 95,-2 98,3 101,-5 104,4 107,-3 110,2 113,-6 116,5 119,-2 122,3 125,-4 128,6 131,-5 134,2 137,-3 140,4"
      fill="none" stroke="#cc0000" stroke-width="0.8" opacity="0.4"/>
  </g>
  <g transform="translate(60, 320)">
    <text x="0" y="0" font-family="monospace" font-size="7" fill="#444">EEG_THETA:</text>
    <polyline points="60,0 64,-2 68,3 72,-3 76,2 80,-4 84,3 88,-2 92,4 96,-3 100,2 104,-4 108,5 112,-2 116,3 120,-3 124,4 128,-2 132,3 136,-4 140,2"
      fill="none" stroke="#888" stroke-width="0.8" opacity="0.3"/>
  </g>
  <!-- Status -->
  <text x="30" y="375" font-family="monospace" font-size="9" fill="#cc0000" opacity="0.4">SRC:PHYSIONET//N=22</text>
  <text x="570" y="375" text-anchor="end" font-family="monospace" font-size="9" fill="#444">D3.JS//WEARABLE_DATA</text>
</svg>
