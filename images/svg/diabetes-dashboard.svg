<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <pattern id="grid-cgm" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="600" height="400" fill="#111"/>
  <rect width="600" height="400" fill="url(#grid-cgm)"/>
  <!-- HUD corners -->
  <path d="M 15 15 L 15 40 M 15 15 L 40 15" stroke="#cc0000" stroke-width="1" opacity="0.4" fill="none"/>
  <path d="M 585 15 L 585 40 M 585 15 L 560 15" stroke="#cc0000" stroke-width="1" opacity="0.4" fill="none"/>
  <path d="M 15 385 L 15 360 M 15 385 L 40 385" stroke="#cc0000" stroke-width="1" opacity="0.4" fill="none"/>
  <path d="M 585 385 L 585 360 M 585 385 L 560 385" stroke="#cc0000" stroke-width="1" opacity="0.4" fill="none"/>
  <!-- Title -->
  <text x="300" y="38" text-anchor="middle" font-family="monospace" font-size="11" fill="#cc0000" opacity="0.5" letter-spacing="6">CGM_GLUCOSE_MONITOR</text>
  <line x1="170" y1="45" x2="430" y2="45" stroke="#cc0000" stroke-width="0.5" opacity="0.2"/>
  <!-- Chart area -->
  <g transform="translate(60, 70)">
    <!-- Y axis -->
    <line x1="0" y1="0" x2="0" y2="240" stroke="#333" stroke-width="1"/>
    <!-- Y labels -->
    <text x="-8" y="5" text-anchor="end" font-family="monospace" font-size="8" fill="#555">300</text>
    <text x="-8" y="65" text-anchor="end" font-family="monospace" font-size="8" fill="#555">200</text>
    <text x="-8" y="125" text-anchor="end" font-family="monospace" font-size="8" fill="#555">140</text>
    <text x="-8" y="185" text-anchor="end" font-family="monospace" font-size="8" fill="#555">80</text>
    <text x="-8" y="245" text-anchor="end" font-family="monospace" font-size="8" fill="#555">40</text>
    <!-- Grid lines -->
    <line x1="0" y1="0" x2="480" y2="0" stroke="#222" stroke-width="0.5" stroke-dasharray="4 4"/>
    <line x1="0" y1="60" x2="480" y2="60" stroke="#222" stroke-width="0.5" stroke-dasharray="4 4"/>
    <line x1="0" y1="120" x2="480" y2="120" stroke="#cc0000" stroke-width="0.5" stroke-dasharray="4 4" opacity="0.3"/>
    <line x1="0" y1="180" x2="480" y2="180" stroke="#cc0000" stroke-width="0.5" stroke-dasharray="4 4" opacity="0.3"/>
    <line x1="0" y1="240" x2="480" y2="240" stroke="#222" stroke-width="0.5"/>
    <!-- Safe zone shading -->
    <rect x="0" y="120" width="480" height="60" fill="#cc0000" opacity="0.03"/>
    <!-- Threshold labels -->
    <text x="485" y="123" font-family="monospace" font-size="7" fill="#cc0000" opacity="0.5">HIGH</text>
    <text x="485" y="183" font-family="monospace" font-size="7" fill="#cc0000" opacity="0.5">LOW</text>
    <!-- Glucose waveform -->
    <polyline points="0,150 15,145 30,130 45,100 55,80 65,60 75,55 85,65 100,90 115,105 130,115 145,130 160,140 175,145 185,150 200,155 215,148 225,135 235,110 250,85 260,70 275,60 285,75 300,100 315,120 330,135 345,145 355,150 365,155 375,160 385,148 395,130 405,100 415,80 425,65 435,55 445,70 460,95 475,120"
      fill="none" stroke="#cc0000" stroke-width="2" opacity="0.9"/>
    <!-- Glow line underneath -->
    <polyline points="0,150 15,145 30,130 45,100 55,80 65,60 75,55 85,65 100,90 115,105 130,115 145,130 160,140 175,145 185,150 200,155 215,148 225,135 235,110 250,85 260,70 275,60 285,75 300,100 315,120 330,135 345,145 355,150 365,155 375,160 385,148 395,130 405,100 415,80 425,65 435,55 445,70 460,95 475,120"
      fill="none" stroke="#cc0000" stroke-width="6" opacity="0.1"/>
    <!-- Meal markers -->
    <line x1="45" y1="240" x2="45" y2="100" stroke="#666" stroke-width="0.5" stroke-dasharray="2 3"/>
    <text x="45" y="255" text-anchor="middle" font-family="monospace" font-size="7" fill="#666">MEAL</text>
    <line x1="235" y1="240" x2="235" y2="110" stroke="#666" stroke-width="0.5" stroke-dasharray="2 3"/>
    <text x="235" y="255" text-anchor="middle" font-family="monospace" font-size="7" fill="#666">MEAL</text>
    <line x1="405" y1="240" x2="405" y2="100" stroke="#666" stroke-width="0.5" stroke-dasharray="2 3"/>
    <text x="405" y="255" text-anchor="middle" font-family="monospace" font-size="7" fill="#666">MEAL</text>
    <!-- Data points at peaks -->
    <circle cx="75" cy="55" r="3" fill="#cc0000" opacity="0.7"/>
    <circle cx="275" cy="60" r="3" fill="#cc0000" opacity="0.7"/>
    <circle cx="435" cy="55" r="3" fill="#cc0000" opacity="0.7"/>
    <!-- X axis time labels -->
    <text x="0" y="275" font-family="monospace" font-size="7" fill="#555">06:00</text>
    <text x="120" y="275" font-family="monospace" font-size="7" fill="#555">10:00</text>
    <text x="240" y="275" font-family="monospace" font-size="7" fill="#555">14:00</text>
    <text x="360" y="275" font-family="monospace" font-size="7" fill="#555">18:00</text>
    <text x="465" y="275" font-family="monospace" font-size="7" fill="#555">22:00</text>
  </g>
  <!-- Status -->
  <text x="30" y="375" font-family="monospace" font-size="9" fill="#cc0000" opacity="0.4">SRC:PHYSIONET//BIG_IDEAS_LAB</text>
  <text x="570" y="375" text-anchor="end" font-family="monospace" font-size="9" fill="#444">D3.JS//PANDAS</text>
  <!-- Current reading display -->
  <rect x="470" y="62" width="110" height="45" fill="#111" stroke="#cc0000" stroke-width="0.5" opacity="0.8"/>
  <text x="525" y="80" text-anchor="middle" font-family="monospace" font-size="8" fill="#666">CURRENT mg/dL</text>
  <text x="525" y="100" text-anchor="middle" font-family="monospace" font-size="22" fill="#cc0000" font-weight="bold">142</text>
</svg>
