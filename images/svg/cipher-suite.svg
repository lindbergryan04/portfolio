    <text x="-25" y="62" text-anchor="middle" font-family="monospace" font-size="9" fill="#666">M</text>
    <text x="-45" y="50" text-anchor="middle" font-family="monospace" font-size="9" fill="#666">N</text>
    <text x="-58" y="30" text-anchor="middle" font-family="monospace" font-size="9" fill="#666">O</text>
