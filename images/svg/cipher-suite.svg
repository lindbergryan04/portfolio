<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <pattern id="grid-cs" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
    </pattern>
    <radialGradient id="glow-cs" cx="50%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#cc0000" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#111" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="400" fill="#111"/>
  <rect width="600" height="400" fill="url(#grid-cs)"/>
  <rect width="600" height="400" fill="url(#glow-cs)"/>
  <!-- HUD corners -->
