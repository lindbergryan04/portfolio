    <text x="-40" y="100" text-anchor="middle" font-family="monospace" font-size="11" fill="#cc0000" opacity="0.5">J</text>
    <text x="-72" y="80" text-anchor="middle" font-family="monospace" font-size="11" fill="#cc0000" opacity="0.6">K</text>
    <text x="-95" y="45" text-anchor="middle" font-family="monospace" font-size="11" fill="#cc0000" opacity="0.5">L</text>
