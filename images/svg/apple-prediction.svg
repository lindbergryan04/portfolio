<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <pattern id="grid-ap" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="600" height="400" fill="#111"/>
  <rect width="600" height="400" fill="url(#grid-ap)"/>
  <!-- HUD corners -->
  <path d="M 15 15 L 15 40 M 15 15 L 40 15" stroke="#cc0000" stroke-width="1" opacity="0.4" fill="none"/>
  <path d="M 585 15 L 585 40 M 585 15 L 560 15" stroke="#cc0000" stroke-width="1" opacity="0.4" fill="none"/>
  <path d="M 15 385 L 15 360 M 15 385 L 40 385" stroke="#cc0000" stroke-width="1" opacity="0.4" fill="none"/>
  <path d="M 585 385 L 585 360 M 585 385 L 560 385" stroke="#cc0000" stroke-width="1" opacity="0.4" fill="none"/>
  <!-- Title -->
  <text x="300" y="38" text-anchor="middle" font-family="monospace" font-size="11" fill="#cc0000" opacity="0.5" letter-spacing="6">CLASSIFICATION_MODEL</text>
  <line x1="170" y1="45" x2="430" y2="45" stroke="#cc0000" stroke-width="0.5" opacity="0.2"/>
  <!-- Scatter plot with decision boundary -->
  <g transform="translate(60, 70)">
    <!-- Axes -->
    <line x1="0" y1="0" x2="0" y2="240" stroke="#333" stroke-width="1"/>
    <line x1="0" y1="240" x2="350" y2="240" stroke="#333" stroke-width="1"/>
    <text x="-10" y="120" text-anchor="middle" font-family="monospace" font-size="7" fill="#555" transform="rotate(-90 -10 120)">SWEETNESS</text>
    <text x="175" y="258" text-anchor="middle" font-family="monospace" font-size="7" fill="#555">CRUNCHINESS</text>
    <!-- Decision boundary -->
    <line x1="20" y1="220" x2="330" y2="20" stroke="#cc0000" stroke-width="1" stroke-dasharray="6 3" opacity="0.4"/>
    <!-- Class 1: Good (red circles) -->
    <circle cx="40" cy="180" r="4" fill="#cc0000" opacity="0.6"/>
    <circle cx="65" cy="160" r="4" fill="#cc0000" opacity="0.5"/>
    <circle cx="50" cy="195" r="4" fill="#cc0000" opacity="0.7"/>
    <circle cx="80" cy="140" r="4" fill="#cc0000" opacity="0.6"/>
    <circle cx="95" cy="155" r="4" fill="#cc0000" opacity="0.5"/>
    <circle cx="70" cy="175" r="4" fill="#cc0000" opacity="0.7"/>
    <circle cx="110" cy="130" r="4" fill="#cc0000" opacity="0.6"/>
    <circle cx="55" cy="210" r="4" fill="#cc0000" opacity="0.5"/>
    <circle cx="90" cy="170" r="4" fill="#cc0000" opacity="0.4"/>
    <circle cx="120" cy="145" r="4" fill="#cc0000" opacity="0.6"/>
    <circle cx="75" cy="190" r="4" fill="#cc0000" opacity="0.5"/>
    <circle cx="105" cy="165" r="4" fill="#cc0000" opacity="0.7"/>
    <circle cx="135" cy="120" r="4" fill="#cc0000" opacity="0.5"/>
    <circle cx="60" cy="200" r="4" fill="#cc0000" opacity="0.4"/>
    <!-- Class 2: Bad (gray circles) -->
    <circle cx="200" cy="80" r="4" fill="#666" opacity="0.5"/>
    <circle cx="220" cy="60" r="4" fill="#666" opacity="0.6"/>
    <circle cx="240" cy="50" r="4" fill="#666" opacity="0.5"/>
    <circle cx="260" cy="70" r="4" fill="#666" opacity="0.4"/>
    <circle cx="180" cy="100" r="4" fill="#666" opacity="0.5"/>
    <circle cx="250" cy="40" r="4" fill="#666" opacity="0.6"/>
    <circle cx="280" cy="55" r="4" fill="#666" opacity="0.5"/>
    <circle cx="210" cy="90" r="4" fill="#666" opacity="0.4"/>
    <circle cx="300" cy="35" r="4" fill="#666" opacity="0.6"/>
    <circle cx="230" cy="75" r="4" fill="#666" opacity="0.5"/>
    <circle cx="270" cy="45" r="4" fill="#666" opacity="0.4"/>
    <circle cx="190" cy="95" r="4" fill="#666" opacity="0.5"/>
    <circle cx="310" cy="25" r="4" fill="#666" opacity="0.4"/>
    <!-- Misclassified point -->
    <circle cx="160" cy="115" r="4" fill="#cc0000" opacity="0.5"/>
    <circle cx="160" cy="115" r="7" fill="none" stroke="#cc0000" stroke-width="0.5" opacity="0.3"/>
  </g>
  <!-- Model metrics panel -->
  <g transform="translate(440, 85)">
    <rect x="0" y="0" width="130" height="160" fill="#151515" stroke="#333" stroke-width="0.5"/>
    <text x="65" y="18" text-anchor="middle" font-family="monospace" font-size="8" fill="#666">MODEL_METRICS</text>
    <line x1="10" y1="25" x2="120" y2="25" stroke="#333" stroke-width="0.5"/>
    <text x="10" y="42" font-family="monospace" font-size="8" fill="#555">Accuracy</text>
    <text x="120" y="42" text-anchor="end" font-family="monospace" font-size="9" fill="#cc0000">0.89</text>
    <text x="10" y="60" font-family="monospace" font-size="8" fill="#555">Precision</text>
    <text x="120" y="60" text-anchor="end" font-family="monospace" font-size="9" fill="#cc0000">0.87</text>
    <text x="10" y="78" font-family="monospace" font-size="8" fill="#555">Recall</text>
    <text x="120" y="78" text-anchor="end" font-family="monospace" font-size="9" fill="#cc0000">0.91</text>
    <text x="10" y="96" font-family="monospace" font-size="8" fill="#555">F1 Score</text>
    <text x="120" y="96" text-anchor="end" font-family="monospace" font-size="9" fill="#cc0000">0.89</text>
    <line x1="10" y1="105" x2="120" y2="105" stroke="#333" stroke-width="0.5"/>
    <text x="10" y="122" font-family="monospace" font-size="7" fill="#444">Model: SVM</text>
    <text x="10" y="136" font-family="monospace" font-size="7" fill="#444">Kernel: RBF</text>
    <text x="10" y="150" font-family="monospace" font-size="7" fill="#444">Features: 7</text>
  </g>
  <!-- Legend -->
  <circle cx="450" cy="275" r="4" fill="#cc0000" opacity="0.6"/>
  <text x="460" y="278" font-family="monospace" font-size="8" fill="#666">GOOD</text>
  <circle cx="450" cy="295" r="4" fill="#666" opacity="0.5"/>
  <text x="460" y="298" font-family="monospace" font-size="8" fill="#666">BAD</text>
  <!-- Status -->
  <text x="30" y="375" font-family="monospace" font-size="9" fill="#cc0000" opacity="0.4">SRC:KAGGLE//APPLE_QA</text>
  <text x="570" y="375" text-anchor="end" font-family="monospace" font-size="9" fill="#444">SKLEARN//JUPYTER</text>
</svg>
