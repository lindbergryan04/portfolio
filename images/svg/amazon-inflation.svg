<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <pattern id="grid-amz" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="600" height="400" fill="#111"/>
  <rect width="600" height="400" fill="url(#grid-amz)"/>
  <!-- HUD corners -->
  <path d="M 15 15 L 15 40 M 15 15 L 40 15" stroke="#cc0000" stroke-width="1" opacity="0.4" fill="none"/>
  <path d="M 585 15 L 585 40 M 585 15 L 560 15" stroke="#cc0000" stroke-width="1" opacity="0.4" fill="none"/>
  <path d="M 15 385 L 15 360 M 15 385 L 40 385" stroke="#cc0000" stroke-width="1" opacity="0.4" fill="none"/>
  <path d="M 585 385 L 585 360 M 585 385 L 560 385" stroke="#cc0000" stroke-width="1" opacity="0.4" fill="none"/>
  <!-- Title -->
  <text x="300" y="38" text-anchor="middle" font-family="monospace" font-size="11" fill="#cc0000" opacity="0.5" letter-spacing="6">CPI_vs_AMAZON_TRACKER</text>
  <line x1="160" y1="45" x2="440" y2="45" stroke="#cc0000" stroke-width="0.5" opacity="0.2"/>
  <!-- Chart -->
  <g transform="translate(70, 75)">
    <!-- Axes -->
    <line x1="0" y1="0" x2="0" y2="220" stroke="#333" stroke-width="1"/>
    <line x1="0" y1="220" x2="460" y2="220" stroke="#333" stroke-width="1"/>
    <!-- Grid -->
    <line x1="0" y1="55" x2="460" y2="55" stroke="#222" stroke-width="0.5" stroke-dasharray="3 3"/>
    <line x1="0" y1="110" x2="460" y2="110" stroke="#222" stroke-width="0.5" stroke-dasharray="3 3"/>
    <line x1="0" y1="165" x2="460" y2="165" stroke="#222" stroke-width="0.5" stroke-dasharray="3 3"/>
    <!-- Y labels -->
    <text x="-8" y="5" text-anchor="end" font-family="monospace" font-size="7" fill="#555">+20%</text>
    <text x="-8" y="58" text-anchor="end" font-family="monospace" font-size="7" fill="#555">+15%</text>
    <text x="-8" y="113" text-anchor="end" font-family="monospace" font-size="7" fill="#555">+10%</text>
    <text x="-8" y="168" text-anchor="end" font-family="monospace" font-size="7" fill="#555">+5%</text>
    <text x="-8" y="223" text-anchor="end" font-family="monospace" font-size="7" fill="#555">0%</text>
    <!-- X labels -->
    <text x="0" y="237" font-family="monospace" font-size="7" fill="#555">2021</text>
    <text x="115" y="237" font-family="monospace" font-size="7" fill="#555">2022</text>
    <text x="230" y="237" font-family="monospace" font-size="7" fill="#555">2023</text>
    <text x="345" y="237" font-family="monospace" font-size="7" fill="#555">2024</text>
    <!-- CPI line -->
    <polyline points="0,200 30,190 60,175 90,150 115,120 145,90 175,75 200,80 230,95 260,110 290,125 320,135 345,142 375,148 405,150 430,155 460,158"
      fill="none" stroke="#888" stroke-width="1.5" opacity="0.6"/>
    <!-- Amazon price line -->
    <polyline points="0,210 30,205 60,185 90,140 115,95 145,55 175,30 200,45 230,80 260,120 290,100 320,85 345,105 375,120 405,110 430,125 460,130"
      fill="none" stroke="#cc0000" stroke-width="2" opacity="0.8"/>
    <!-- Glow -->
    <polyline points="0,210 30,205 60,185 90,140 115,95 145,55 175,30 200,45 230,80 260,120 290,100 320,85 345,105 375,120 405,110 430,125 460,130"
      fill="none" stroke="#cc0000" stroke-width="6" opacity="0.08"/>
    <!-- Peak marker -->
    <circle cx="175" cy="30" r="4" fill="none" stroke="#cc0000" stroke-width="1" opacity="0.6"/>
    <text x="175" y="22" text-anchor="middle" font-family="monospace" font-size="7" fill="#cc0000" opacity="0.6">PEAK</text>
  </g>
  <!-- Legend -->
  <g transform="translate(420, 85)">
    <line x1="0" y1="0" x2="20" y2="0" stroke="#cc0000" stroke-width="2" opacity="0.8"/>
    <text x="25" y="3" font-family="monospace" font-size="8" fill="#cc0000" opacity="0.6">AMAZON</text>
    <line x1="0" y1="16" x2="20" y2="16" stroke="#888" stroke-width="1.5" opacity="0.6"/>
    <text x="25" y="19" font-family="monospace" font-size="8" fill="#666">CPI</text>
  </g>
  <!-- Dollar sign decoration -->
  <text x="510" y="250" font-family="monospace" font-size="40" fill="#cc0000" opacity="0.06">$</text>
  <text x="490" y="280" font-family="monospace" font-size="25" fill="#cc0000" opacity="0.04">$</text>
  <!-- Status -->
  <text x="30" y="375" font-family="monospace" font-size="9" fill="#cc0000" opacity="0.4">SRC:KEEPA//BLS_CPI_DATA</text>
  <text x="570" y="375" text-anchor="end" font-family="monospace" font-size="9" fill="#444">ECONOMICS//STATISTICS</text>
</svg>
