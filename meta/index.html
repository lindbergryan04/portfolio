<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RL:// Meta</title>
    <link rel="stylesheet" href="../style.css">
</head>

<body>
    <div class="section-watermark">06</div>

    <div class="page-header">
        <h1>Meta Statistics</h1>
        <div class="subtitle">WEBSITE ANALYTICS & COMMIT DATA</div>
    </div>

    <div class="window">
        <div class="window-titlebar">
            <span class="window-controls">
                <span class="dot dot-close"></span>
                <span class="dot dot-min"></span>
                <span class="dot dot-max"></span>
            </span>
            <span class="window-title">WEBSITE_STATS</span>
        </div>
        <div class="window-body">
            <div id="stats"></div>
        </div>
    </div>

    <div class="window">
        <div class="window-titlebar">
            <span class="window-controls">
                <span class="dot dot-close"></span>
                <span class="dot dot-min"></span>
                <span class="dot dot-max"></span>
            </span>
            <span class="window-title">FILE_BREAKDOWN</span>
        </div>
        <div class="window-body">
            <dl id="files"></dl>
        </div>
    </div>

    <script src="../global.js" type="module"></script>
    <script src="main.js" type="module"></script>
    <script type="module" src="../decorations.js"></script>
</body>

</html>
